name: ipc_app
description: IPC – Conversor pixel perfect.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.9
  provider: ^6.1.1
  fl_chart: ^0.66.0
  table_calendar: ^3.0.9
  flutter_math_fork: ^0.7.2
  http: ^1.1.0
  lottie: ^2.7.0
  intl: ^0.18.1
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/svg/
    - assets/icons/png/
    - assets/icons/lottie/
    - assets/fonts/pattern/

  fonts:
    - family: TimesNewRoman
      fonts:
        - asset: assets/fonts/pattern/times_new_roman.ttf
          weight: 400
        - asset: assets/fonts/pattern/times_new_roman.ttf
          weight: 700