<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Nexa Calendar</title>
  <link rel="icon" href="/icons/png/logo.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none; }
    html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; position: fixed; width: 100vw; height: 100dvh; }
    #app { width: 100vw; height: 100dvh; display: flex; flex-direction: column; position: relative; overflow: hidden; }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="toast" style="position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(100px);background:#323232;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;opacity:0;transition:all 0.3s ease;z-index:99999;pointer-events:none;white-space:nowrap;"></div>
  <script type="module" src="./main.js"></script>
</body>
</html>
