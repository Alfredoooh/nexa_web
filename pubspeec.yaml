name: meu_app_web
description: Um projeto Flutter web de exemplo.

publish_to: 'none' # Remove essa linha se quiser publicar no pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Adicione outras dependências aqui, ex:
  # http: ^1.1.0
  # provider: ^6.0.0

