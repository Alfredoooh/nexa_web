<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Página não encontrada — Nexa</title>
  <link rel="icon" href="/icons/svg/calendar.svg" type="image/svg+xml" />
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('nexa_theme') || 'system';
        var isDark = saved === 'dark' || (saved === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; margin: 0; padding: 0; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
    #app { width: 100vw; min-height: 100dvh; }
    :root[data-theme="dark"] { background: #0b0b0d; }
    :root[data-theme="light"] { background: #ffffff; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./main.js"></script>
</body>
</html>
